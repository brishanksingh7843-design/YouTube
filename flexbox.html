<!doctype html>
<html>
  <head>
    <title>FlexBox</title>
    <style>
      .flexbox {
        display: flex;
        flex-direction: row;
      }
      .flexbox1 {
        display: flex;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="flexbox">
      <div class="items" style="background-color: lightpink">Div 1 Text</div>
      <div class="items" style="background-color: lightblue">
        Div 2 Text and Text too
      </div>
    </div>

    <div class="flexbox1">
      <div class="items" style="background-color: lightpink; width: 120px">
        120px
      </div>
      <div class="items" style="background-color: lightblue; flex: 1">
        flex:1
      </div>
    </div>

    <div style="display: flex; flex-direction: row; margin-top:10px;">
      <div style="background-color: lightpink; width: 100px">100px</div>
      <div style="background-color: lightblue; flex: 1">flex:1</div>
      <div style="background-color: lightyellow; flex: 2">flex:2</div>
    </div>

    <div style="display: flex; flex-direction: row; margin-top:10px; justify-content:center; border:1px solid black;">
      <div style="background-color: lightpink; width: 100px;border-left:1px solid black;">100px</div>
      <div style="background-color: lightblue; width:100px;border-left:1px solid black;border-right:1px solid;">100px</div>
      <div style="background-color: lightyellow; width:100px;border-right:1px solid black;">100px</div></div>


      <div style="display: flex; flex-direction: row; margin-top:10px; height:100px; align-items:center; justify-content:space-between;; border:1px solid black;">
      <div style="background-color: lightpink; width: 100px;border-right:1px solid black;">100px</div>
      <div style="background-color: lightblue; width:100px;border-left:1px solid black;border-right:1px solid;">100px</div>
      <div style="background-color: lightyellow; width:100px;border-left:1px solid black;">100px</div>
    </div>
    two important properties are justify content: values are center, space-between etc && align-items: values start, end, center;

  </body>
</html>
