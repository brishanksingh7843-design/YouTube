<!doctype html>
<html>
  <head>
    <title>CSS Position</title>
    <style>
      div {
        height: 200px;
      }
      .div1 {
        width:200px;
        background-color: lightblue;
      }
      .div2 {
        width:200px;
        background-color: lightpink;
      }
      .header {
        background-color: lightgreen;
        height: 50px;
        position: fixed; /*important other value position:abosolute... position:relative...*/
        top: 0px;
        left: 50px;
        right:50px;
        text-align: center;
        /* z-index:1 this is very importnat property and the element with higher z-index will apper above the elements with lower z-index if overlapped */
      }
    </style>
  </head>
  <body style="margin-bottom: 5000px">
    <div class="header">HEADER</div>
    <div class="div1">DIV - 1</div>
    <div class="div2">DIV - 2</div>
  </body>
</html>
